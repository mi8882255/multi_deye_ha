name: "Deye Multi-Inverter Reader"
description: "Read data from multiple Deye inverters via Modbus TCP and publish to MQTT"
version: "1.1.3"
slug: "deye_multi_inverter"
url: "https://github.com/mi8882255/multi_deye_ha"
arch:
  - amd64
  - aarch64
  - armv7
init: false
startup: application
boot: auto
services:
  - mqtt:want
map:
  - config:rw
options:
  inverters:
    - id: "inv-1"
      host: "192.168.1.100"
      port: 502
      unitId: 1
      model: "deye-sun-3phase-lv"
      name: "Main Inverter"
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  topic_prefix: "deye"
  discovery_prefix: "homeassistant"
  read_interval: 10
  report_interval: 30
  gap_tolerance: 10
  stale_threshold_seconds: 120
  slow_poll_multiplier: 6
  log_level: "info"
schema:
  inverters:
    - id: str
      host: str
      port: "port?"
      unitId: "int(1,247)?"
      model: "list(deye-sun-3phase-lv|deye-sun-3phase-hv|deye-sg05lp3|deye-hybrid-1p|deye-sg02lp1|deye-micro)"
      name: "str?"
      sensors:
        - "str?"
      serialNumber: "int?"
      retries: "int(0,10)?"
      retryMinDelay: "int(0,5000)?"
      retryMaxDelay: "int(0,10000)?"
  mqtt_host: "str?"
  mqtt_port: "port?"
  mqtt_username: "str?"
  mqtt_password: "password?"
  topic_prefix: "str?"
  discovery_prefix: "str?"
  read_interval: "int(1,3600)?"
  report_interval: "int(1,3600)?"
  gap_tolerance: "int(1,100)?"
  stale_threshold_seconds: "int(1,600)?"
  slow_poll_multiplier: "int(1,60)?"
  log_level: "list(trace|debug|info|warn|error|fatal)?"
